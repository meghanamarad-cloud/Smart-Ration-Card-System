<!doctype html>
<html>
<head><meta charset="utf-8"><title>Distribute - Smart Ration</title></head>
<body>
  <h2>Create Distribution Request (web side)</h2>
  <form method="post" action="{{ url_for('distribute') }}">
    <label>Item</label>
    <select name="item_id" required>
      {% for s in stock %}
        <option value="{{ s.id }}">{{ s.item_name }} (Available: {{ s.quantity }})</option>
      {% endfor %}
    </select>
    <label>Quantity</label>
    <input type="number" name="quantity" min="1" required>
    <button type="submit">Create Request</button>
  </form>
  <p><a href="{{ url_for('dashboard') }}">Back</a></p>
</body>
</html>
